name: Deploy React to Pages

on:
push:
branches: [main]

permissions:
contents: read
pages: write
id-token: write

jobs:
build_site:
runs-on: ubuntu-latest
steps:
- name: Checkout
uses: actions/checkout@v4

deploy:
needs: build_site
runs-on: ubuntu-latest
environment:
name: github-pages
steps:
- name: Deploy
id: deployment
uses: actions/deploy-pages@v4
